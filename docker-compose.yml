services:
  db:
    image: postgres:16
    container_name: estimate_matcher_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-estimate_matcher}
      POSTGRES_USER: ${POSTGRES_USER:-estimate_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASS:-estimate_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7
    container_name: estimate_matcher_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
  
  ollama:
    image: ollama/ollama:latest
    container_name: estimate_matcher_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data: